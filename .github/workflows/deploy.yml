name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Copy dist to docs
        run: |
          rm -rf docs
          cp -r dist docs

      - name: Commit and push docs
        run: |
          git config user.email "michaelpyon@gmail.com"
          git config user.name "Michael Pyon"
          git add docs/
          git diff --cached --quiet || git commit -m "chore: update docs/ from build [skip ci]"
          git push
